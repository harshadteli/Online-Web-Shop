<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | SWAMI</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f0f0f;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .pay-box {
            background: white;
            width: 95%;
            max-width: 420px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 300;
            color: var(--dark);
        }

        .total-banner {
            background: var(--dark);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .total-banner span {
            color: var(--gold);
            font-weight: bold;
        }

        .method-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .method-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #eee;
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            transition: 0.3s;
        }

        .method-btn.active {
            background: var(--dark);
            color: var(--gold);
            border-color: var(--dark);
        }

        .pay-section {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* QR Code Container */
        .qr-container {
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #eee;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 15px;
        }

        .qr-container img {
            width: 180px;
            /* QR size has been adjusted */
            height: 180px;
            display: block;
            object-fit: contain;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            text-align: center;
        }

        .pay-btn {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: var(--gold);
        }

        #loader {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="pay-box">
        <h2>Secure Checkout</h2>
        <div class="total-banner">Total: <span id="amount-to-pay">₹0.00</span></div>

        <div class="method-tabs">
            <button type="button" class="method-btn active" onclick="showMethod('upi', this)">UPI / QR</button>
            <button type="button" class="method-btn" onclick="showMethod('cod', this)">COD</button>
        </div>

        <form id="payment-form">
            <input type="hidden" name="total_amount" id="hidden-amount">
            <input type="hidden" name="payment_method" id="selected-method" value="upi">

            <div id="upi-section" class="pay-section">
                <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Scan and complete the payment.</p>
                <div class="qr-container">
                    <img src="Img/QR.jpg" alt="Your UPI QR Code">
                </div>
                <input type="text" name="upi_id" placeholder="Enter your UPI ID (e.g. name@upi)">
            </div>

            <div id="cod-section" class="pay-section" style="display: none;">
                <div style="background: #fff8e1; border: 1px dashed #ffb300; padding: 25px; border-radius: 12px;">
                    <span style="font-size: 30px;">📦</span>
                    <p style="font-size: 14px; color: #856404; font-weight: bold; margin: 10px 0 5px;">Cash on Delivery
                    </p>
                    <p style="font-size: 12px; color: #666; line-height: 1.4;">Pay on delivery. Please keep the exact
                        change ready.</p>
                </div>
            </div>

            <button type="submit" class="pay-btn" id="submit-btn">PAY VIA UPI</button>

            <div id="loader">
                <div class="spinner"></div>
                <p style="font-size: 11px; color: #666; margin-top: 8px;">The order is being processed...</p>
            </div>
        </form>
    </div>

    <script>
        // Total amount to be paid
        window.onload = function () {
            const cart = JSON.parse(localStorage.getItem('swamiCart')) || [];
            let total = 0;
            cart.forEach(item => total += (item.price * item.quantity));
            document.getElementById('amount-to-pay').innerText = `₹${total.toFixed(2)}`;
            document.getElementById('hidden-amount').value = total.toFixed(2);
        }

        // Change payment method
        function showMethod(method, btn) {
            document.querySelectorAll('.pay-section').forEach(sec => sec.style.display = 'none');
            document.getElementById(method + '-section').style.display = 'flex';
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('selected-method').value = method;
            document.getElementById('submit-btn').innerText = (method === 'cod') ? 'PLACE ORDER (COD)' : 'PAY VIA UPI';
        }

        // Submit Logic
        document.getElementById('payment-form').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                // Save Order Logic
                try {
                    const cart = JSON.parse(localStorage.getItem('swamiCart')) || [];
                    const total = document.getElementById('hidden-amount').value;
                    const customer = JSON.parse(localStorage.getItem('swamiDeliveryInfo')) || { name: 'Guest', phone: 'N/A' };

                    const orderBy = customer.name;
                    const phone = customer.phone;
                    // Construct full address
                    const address = `${customer.address}, ${customer.city}, ${customer.pincode}`;
                    const date = new Date().toLocaleString();
                    const items = cart.map(i => `${i.name} (x${i.quantity})`).join(', ');

                    const newOrder = {
                        id: 'ORD-' + Math.floor(Math.random() * 100000),
                        customer: orderBy,
                        phone: phone,
                        address: address, // Saved Address
                        amount: total,
                        items: items,
                        date: date
                    };

                    let orders = [];
                    try {
                        orders = JSON.parse(localStorage.getItem('swamiOrders')) || [];
                    } catch (e) {
                        console.error("Orders corrupted, resetting", e);
                        orders = [];
                    }

                    orders.push(newOrder);
                    localStorage.setItem('swamiOrders', JSON.stringify(orders));

                    // Clear Cart
                    localStorage.removeItem('swamiCart');

                    // Redirect
                    window.location.href = "success.html";
                } catch (error) {
                    console.error("Order Save Failed:", error);
                    alert("System Error: Could not save order. Please show this to Admin: " + error.message);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('submit-btn').style.display = 'block';
                }
            }, 3000);
        });
    </script>

</body>

</html>
