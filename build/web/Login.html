<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS | Login</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #0f0f0f;
            --text-main: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?auto=format&fit=crop&w=1300&q=80');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: var(--dark-bg);
        }

        h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 0;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-gold);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--dark-bg);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: var(--primary-gold);
        }

        .links {
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .links a {
            color: var(--primary-gold);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">SWAMI</div>
        <h2>Member Login</h2>

        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <script>
            document.getElementById('login-form').addEventListener('submit', function (e) {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const users = JSON.parse(localStorage.getItem('swamiUsers')) || [];
                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    alert("Login successful! Welcome " + user.name);
                    window.location.href = "index.html"; // Redirect to home
                } else {
                    alert("Invalid email or password!");
                }
            });
        </script>

        <div class="links">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

</body>

</html>
