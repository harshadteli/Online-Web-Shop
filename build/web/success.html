<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed | SWAMI Timepieces</title>
    <style>
        :root { --gold: #d4af37; --dark: #0f0f0f; }
        body { 
            font-family: 'Helvetica Neue', Arial; 
            background: #fcfcfc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .success-card {
            background: white;
            padding: 50px;
            text-align: center;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        .icon {
            font-size: 50px;
            color: var(--gold);
            margin-bottom: 20px;
        }
        h1 { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 300; 
            margin-bottom: 10px;
        }
        p { color: #666; line-height: 1.6; }
        .order-id { 
            font-weight: bold; 
            color: var(--dark); 
            margin: 20px 0; 
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: var(--dark);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">✓</div>
        <h1>Thank You!</h1>
        <p>Your order has been successfully placed. You will receive a confirmation via email shortly.</p>
        <span class="order-id">Order ID: #SW-99281</span>
        <a href="index.html" class="back-btn">Continue Shopping</a>
    </div>

</body>
</html>
