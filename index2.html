<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAMI | Premium Watch Store</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #0f0f0f;
            --text-main: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fcfcfc;
            color: var(--text-main);
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin: 0 20px; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary-gold); }

        /* HERO SECTION - Background Image Fixed */
        .hero {
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            letter-spacing: 12px;
            margin-bottom: 20px;
        }

        .hero-btn {
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .hero-btn:hover { background: white; color: black; }

        /* PRODUCT GRID */
        .container { padding: 80px 8%; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: white;
            padding: 0 0 20px 0;
            text-align: center;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .product-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .img-container img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .price {
            color: var(--primary-gold);
            font-weight: 700;
            display: block;
            margin: 10px 0;
        }

        .add-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .add-btn:hover { background: var(--primary-gold); }

        footer {
            background: var(--dark-bg);
            color: white;
            padding: 40px 8%;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SWAMI</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="Menu.html">Menu</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="Cart.html">Cart</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>SWAMI</h1>
            <a href="#collection" class="hero-btn">VIEW COLLECTION</a>
        </div>
    </header>

    <main class="container" id="collection">
        <div class="section-header">
            <h2>The New Arrivals</h2>
        </div>

        <div class="grid">
            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600" alt="Watch 1">
                </div>
                <h3>Grand Classic Silver</h3>
                <span class="price">₹1200</span>
                <button class="add-btn" onclick="addToCart('Grand Classic Silver', 1200)">Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=600" alt="Watch 2">
                </div>
                <h3>Midnight Leather</h3>
                <span class="price">₹850</span>
                <button class="add-btn" onclick="addToCart('Midnight Leather', 850)">Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?w=600" alt="Watch 3">
                </div>
                <h3>Golden Executive</h3>
                <span class="price">₹2400</span>
                <button class="add-btn" onclick="addToCart('Golden Executive', 2400)">Add to Cart</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SWAMI TIMEPIECES. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // हा फंक्शन डेटा सेव्ह करतो
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.push({ name, price });
            localStorage.setItem('myCart', JSON.stringify(cart));
            alert(name + " कार्टमध्ये ॲड झाले आहे!");
        }
    </script>

</body>
</html>
