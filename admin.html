<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SWAMI Premium</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f0f0f;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--light);
        }

        /* Login Overlay Style */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: var(--dark);
            letter-spacing: 2px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .login-box button {
            background: var(--gold);
            color: white;
            border: none;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            border-radius: 5px;
        }

        /* Dashboard Style */
        header {
            background: var(--dark);
            color: white;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            padding: 40px 8%;
        }

        h2 {
            border-left: 5px solid var(--gold);
            padding-left: 15px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        th {
            background: #eee;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        tr:hover {
            background: #fff9e6;
        }

        .status-paid {
            color: #27ae60;
            font-weight: bold;
            background: #eafaf1;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        code {
            background: #f4f4f4;
            padding: 4px 8px;
            border-radius: 4px;
            color: #e67e22;
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>ADMIN LOGIN</h2>
            <input type="password" id="admin-pass" placeholder="Enter password">
            <button onclick="verifyPassword()">Login</button>
        </div>
    </div>

    <header>
        <div class="logo" style="letter-spacing: 4px; font-weight: 900;">SWAMI ADMIN</div>
        <button onclick="location.reload()"
            style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px 10px;">Refresh</button>
        <button onclick="resetData()"
            style="background:none; border:1px solid #e74c3c; color:#e74c3c; cursor:pointer; padding:5px 10px; margin-left:10px;">Reset
            Data</button>
    </header>

    <div class="container">

        <!-- ORDERS SECTION -->
        <div style="margin-bottom: 50px;">
            <h2>Recent Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Details</th>
                        <th>Total Amount</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="order-table-body">
                </tbody>
            </table>
        </div>

        <!-- USERS SECTION -->
        <div style="margin-bottom: 50px;">
            <h2>Registered Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>User Details</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                </tbody>
            </table>
        </div>

        <!-- INQUIRIES SECTION -->
        <div style="margin-bottom: 50px; border-top: 1px solid #ccc; padding-top: 30px;">
            <h2>Customer Messages</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>From</th>
                        <th>Subject</th>
                        <th>Message</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="inquiry-table-body">
                </tbody>
            </table>
        </div>

        <!-- PRODUCTS SECTION -->
        <div style="margin-bottom: 50px; border-top: 1px solid #ccc; padding-top: 30px;">
            <h2>Manage Products</h2>

            <div style="display: flex; gap: 30px; align-items: flex-start;">

                <!-- Add Product Form -->
                <div
                    style="flex: 1; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                    <h3 style="margin-top: 0; color: var(--gold);">Add New Product</h3>
                    <form id="add-product-form" onsubmit="addProduct(event)">
                        <input type="text" id="p-name" placeholder="Product Name" required
                            style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd;">
                        <input type="number" id="p-price" placeholder="Price (₹)" required
                            style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd;">
                        <input type="text" id="p-image" placeholder="Image URL (http://...)" required
                            style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd;">
                        <input type="text" id="p-desc" placeholder="Description" required
                            style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd;">
                        <input type="text" id="p-tag" placeholder="Tag (e.g. New Arrival)"
                            style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd;">
                        <button type="submit"
                            style="width:100%; padding:10px; background:var(--dark); color:white; border:none; cursor:pointer;">Add
                            Product</button>
                    </form>
                </div>

                <!-- Product List -->
                <div style="flex: 2;">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="product-list-body">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 1. Password Verification
        function verifyPassword() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "123" || pass === "admin") {
                document.getElementById('login-overlay').style.display = 'none';
                loadDashboard();
            } else {
                alert("Incorrect password! Access denied.");
            }
        }

        function loadDashboard() {
            try {
                loadOrders();
                loadProducts();
                loadInquiries();
                loadUsers();
            } catch (error) {
                console.error("Dashboard Load Error:", error);
                alert("Error loading data. It might be corrupted. Try the 'Reset Data' button.");
            }
        }

        // ================= USERS SECTION =================
        function loadUsers() {
            let users = [];
            try {
                users = JSON.parse(localStorage.getItem('swamiUsers')) || [];
            } catch (e) { users = []; }

            const tableBody = document.getElementById('user-table-body');

            if (users.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No registered users.</td></tr>";
                return;
            }

            tableBody.innerHTML = users.map((u, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${u.name}</strong><br><span style="font-size:11px; color:#555;">${u.email}</span></td>
                    <td><button onclick="deleteUser('${u.email}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:3px;">Remove</button></td>
                </tr>
            `).join('');
        }

        function deleteUser(email) {
            if (confirm("Remove this user?")) {
                let users = JSON.parse(localStorage.getItem('swamiUsers')) || [];
                users = users.filter(u => u.email !== email);
                localStorage.setItem('swamiUsers', JSON.stringify(users));
                loadUsers();
            }
        }

        // ================= INQUIRIES SECTION =================
        function loadInquiries() {
            let inquiries = [];
            try {
                inquiries = JSON.parse(localStorage.getItem('swamiInquiries')) || [];
            } catch (e) { inquiries = []; }

            const tableBody = document.getElementById('inquiry-table-body');

            if (inquiries.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No messages received.</td></tr>";
                return;
            }

            inquiries.reverse(); // Newest first

            tableBody.innerHTML = inquiries.map(msg => `
                <tr>
                    <td><code>${msg.date}</code></td>
                    <td><strong>${msg.name}</strong><br><span style="font-size:11px; color:#555;">${msg.email}</span></td>
                    <td>${msg.subject}</td>
                    <td><div style="max-width:300px; font-size:13px; color:#333;">${msg.message}</div></td>
                    <td><button onclick="deleteInquiry('${msg.id}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:3px;">Delete</button></td>
                </tr>
            `).join('');
        }

        function deleteInquiry(id) {
            if (confirm("Delete this message?")) {
                let inquiries = JSON.parse(localStorage.getItem('swamiInquiries')) || [];
                inquiries = inquiries.filter(i => i.id !== id);
                localStorage.setItem('swamiInquiries', JSON.stringify(inquiries));
                loadInquiries();
            }
        }

        // ================= ORDERS MANAGEMENT =================
        function loadOrders() {
            let orders = [];
            try {
                orders = JSON.parse(localStorage.getItem('swamiOrders')) || [];
            } catch (e) {
                console.error("Orders Data Corrupted", e);
                orders = [];
            }

            const tableBody = document.getElementById('order-table-body');

            if (!orders || orders.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No orders received yet.</td></tr>";
                return;
            }

            // Sort by newest first
            orders.reverse();

            tableBody.innerHTML = orders.map(order => `
                <tr>
                    <td>${order.id}</td>
                    <td>
                        <strong>${order.customer}</strong><br>
                        <span style="font-size:11px; color:#555;">${order.phone || 'N/A'}</span><br>
                        <span style="font-size:10px; color:#777;">${order.address || 'Address not available'}</span>
                    </td>
                    <td><strong>₹${parseFloat(order.amount || 0).toFixed(2)}</strong></td>
                    <td><code>${order.date}</code></td>
                    <td>
                        <span style="font-size:12px;">${order.items}</span>
                    </td>
                    <td><span class="status-paid">PAID</span></td>
                </tr>
            `).join('');
        }

        // ================= PRODUCT MANAGEMENT =================
        function loadProducts() {
            let products = [];
            try {
                products = JSON.parse(localStorage.getItem('swamiProducts')) || [];
            } catch (e) {
                console.error("Product Data Corrupted", e);
                products = [];
            }

            // SEEDING: If no products found (e.g. new localhost session), add defaults
            if (products.length === 0) {
                const initialProducts = [
                    {
                        name: "Silver Round SmartWatch",
                        price: 4500.00,
                        image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80",
                        desc: "Touch screen fitness tracking heart rate monitor.",
                        tag: "New Arrival",
                        hidden: false
                    },
                    {
                        name: "Midnight Leather",
                        price: 500.00,
                        image: "https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?auto=format&fit=crop&w=600&q=80",
                        desc: "Genuine Italian leather with obsidian dial.",
                        tag: "",
                        hidden: false
                    },
                    {
                        name: "Citizen",
                        price: 18000.00,
                        image: "https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?auto=format&fit=crop&w=600&q=80",
                        desc: "Time that powers itself.",
                        tag: "",
                        hidden: false
                    },
                    {
                        name: "Digital Watch",
                        price: 3000.00,
                        image: "Img/digital1.jpg",
                        desc: "Water resistant 200m, luminescent hands.",
                        tag: "Limited",
                        hidden: false
                    },
                    {
                        name: "Eternia classic",
                        price: 15200.00,
                        image: "Img/classic6.avif",
                        desc: "Stainless steel case(silver finish).",
                        tag: "New Arrival",
                        hidden: false
                    },
                    {
                        name: "YAZOLE",
                        price: 1200.00,
                        image: "Img/luxury4.webp",
                        desc: "Elegant quartz watch with a sleek metal strap.",
                        tag: "New Arrival",
                        hidden: false
                    }
                ];
                products = initialProducts;
                localStorage.setItem('swamiProducts', JSON.stringify(products));
            }

            const productList = document.getElementById('product-list-body');

            if (!products || products.length === 0) {
                productList.innerHTML = "<tr><td colspan='4'>No products found.</td></tr>";
                return;
            }

            productList.innerHTML = products.map((p, index) => `
                <tr style="${p.hidden ? 'opacity: 0.5; background: #f0f0f0;' : ''}">
                    <td><img src="${p.image}" style="width:50px; height:50px; object-fit:cover;"></td>
                    <td>
                        ${p.name}
                        ${p.hidden ? '<br><span style="font-size:10px; color:red; font-weight:bold;">(HIDDEN)</span>' : ''}
                    </td>
                    <td>₹${p.price}</td>
                    <td>
                        <button onclick="toggleHide(${index})" style="background:${p.hidden ? '#27ae60' : '#f39c12'}; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:3px; margin-right:5px;">
                            ${p.hidden ? 'Show' : 'Hide'}
                        </button>
                        <button onclick="deleteProduct(${index})" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:3px;">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function addProduct(e) {
            e.preventDefault();
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const image = document.getElementById('p-image').value;
            const desc = document.getElementById('p-desc').value;
            const tag = document.getElementById('p-tag').value;

            let products = [];
            try {
                products = JSON.parse(localStorage.getItem('swamiProducts')) || [];
            } catch (e) { products = []; }

            // Add hidden: false by default
            products.push({ name, price, image, desc, tag, hidden: false });
            localStorage.setItem('swamiProducts', JSON.stringify(products));

            alert("Product Added Successfully!");
            document.getElementById('add-product-form').reset();
            loadProducts();
        }

        function toggleHide(index) {
            let products = JSON.parse(localStorage.getItem('swamiProducts')) || [];
            if (products[index].hidden === undefined) products[index].hidden = false; // Initialize if undefined
            products[index].hidden = !products[index].hidden;
            localStorage.setItem('swamiProducts', JSON.stringify(products));
            loadProducts();
        }

        function deleteProduct(index) {
            if (confirm("Are you sure you want to delete this product?")) {
                const products = JSON.parse(localStorage.getItem('swamiProducts')) || [];
                products.splice(index, 1);
                localStorage.setItem('swamiProducts', JSON.stringify(products));
                loadProducts();
            }
        }

        // Utility: Reset Data (Useful for debugging)
        function resetData() {
            if (confirm("WARNING: This will delete ALL products and orders. Are you sure?")) {
                localStorage.removeItem('swamiOrders');
                localStorage.removeItem('swamiProducts');
                alert("Data cleared. Please refresh the page.");
                location.reload();
            }
        }
    </script>
</body>

</html>
